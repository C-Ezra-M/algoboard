<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algoboard v.0.1.4</title>
    <link rel="stylesheet" href="src/common.css">
    <link rel="stylesheet" href="src/app.css">
    <script type="module" src="/src/script.js"></script>
</head>

<body>
    <div id="board" class="board">
        <div id="ranks" class="ranks"></div>
        <div class="bars" id="bars"></div>
    </div>
    <div id="control" class="control">
        <h1>Algoboard v0.1.4</h1>
        <p><strong>WARNING!</strong> Algoboard is in beta, so things can change without warning.</p>
        <noscript><p>You must enable JavaScript to use this app.</p></noscript>
        <label for="importFile">Input file:</label>
        <input type="file" name="importFile" id="importFile">
        <button name="animate" id="animate">Animate!</button>
        <button name="reset" id="reset">Reset</button>
        <button name="showData" id="showData">Show data</button>
        <dialog id="dataDialog">
            <form method="dialog">
                <button type="button"><i class="fa-solid fa-square-caret-left"></i> Next event</button>
                <!-- TODO Actually implement the feature (#2) -->
                <button><i class="fa-solid fa-xmark"></i> Close</button>
            </form>
            <active-table id="entry-table"
            data='[
                ["Contestant name", "Color", "Points before", "Points after", "Status"],
                ["", "", 0, 0, "safe"]
            ]'
            customColumnsSettings='[
                { "headerName": "Contestant name", "defaultColumnTypeName": "text" },
                { "headerName": "Color", "defaultColumnTypeName": "text" },
                { "headerName": "Points before", "defaultColumnTypeName": "number" },
                { "headerName": "Points after", "defaultColumnTypeName": "number" },
                { "headerName": "Status", "defaultColumnTypeName": "Status" }
            ]'
            customColumnTypes='[{
                "name": "Status",
                "select": {
                    "options": ["safe", "eliminated", "newEliminated", "rejoining"],
                    "canAddMoreOptions": false
                },
                "iconSettings": {
                    "reusableIconName": "select"
                }
            }]'
            ></active-table>
        </dialog>
    </div>
    <footer>
        <ul>
            <li><a href="help.html">Help</a></li>
            <li><a href="https://raw.githubusercontent.com/C-Ezra-M/algoboard/refs/heads/main/example.csv">Example input file</a></li>
            <li><a href="https://github.com/C-Ezra-M/algoboard/issues/new">Report issue (requires GitHub account)</a></li>
            <li><a href="https://github.com/C-Ezra-M/algoboard">Repository</a></li>
        </ul>
    </footer>
</body>

</html>
